name: Publish release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Read release version
        id: version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' NmeaTransport/NmeaTransport.csproj || true)
          if [[ -z "$version" ]]; then
            echo "Could not find <Version> in NmeaTransport/NmeaTransport.csproj" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$version' is not in MAJOR.MINOR.PATCH format" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists" >&2
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack --no-build --configuration Release --output ./artifacts

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v version="$version" '
            BEGIN { in_section=0 }
            $0 ~ "^## \\[?" version "\\]?" {
              in_section=1
              print
              next
            }
            /^## / && in_section {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Could not extract changelog section for version $version" >&2
            exit 1
          fi

      - name: Create git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            ./artifacts/*.nupkg

      - name: Publish package to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_TOKEN }}" \
            --source https://api.nuget.org/v3/index.json
