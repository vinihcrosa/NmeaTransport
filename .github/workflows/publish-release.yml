name: Publish release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release-please--branches--main')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged release commit
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Read release version
        id: version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' NmeaTransport/NmeaTransport.csproj || true)
          if [[ -z "$version" ]]; then
            echo "Could not find <Version> in NmeaTransport/NmeaTransport.csproj" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$version' is not in MAJOR.MINOR.PATCH format" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Detect existing tag
        id: tag-state
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack --no-build --configuration Release --output ./artifacts

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v version="$version" '
            BEGIN { in_section=0 }
            $0 ~ "^## \\[?" version "\\]?" {
              in_section=1
              print
              next
            }
            /^## / && in_section {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            {
              echo "## [$version]"
              echo
              echo "Automated release for version $version."
            } > release-notes.md
          fi

      - name: Create git tag
        if: steps.tag-state.outputs.exists != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Detect existing GitHub release
        id: release-state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub release ${{ steps.version.outputs.tag }} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release-state.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            ./artifacts/*.nupkg

      - name: Upload package asset to existing GitHub release
        if: steps.release-state.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" ./artifacts/*.nupkg --clobber

      - name: Publish package to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_TOKEN }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Mark release PR as tagged
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh label list --search "autorelease: tagged" --json name --jq '.[].name' | grep -Fxq "autorelease: tagged"; then
            gh label create "autorelease: tagged" --color "0e8a16" --description "Release PR already tagged and published"
          fi

          gh pr edit "${{ github.event.pull_request.number }}" \
            --remove-label "autorelease: pending" \
            --add-label "autorelease: tagged"
